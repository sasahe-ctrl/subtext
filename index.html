<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给聪聪的生日贺卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#050510;font-family:"Noto Serif SC",serif;display:flex;flex-direction:column;align-items:center;justify-content:center}
.starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.08;transform:scale(.7)}100%{opacity:.6;transform:scale(1.2)}}
#intro{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#050510;transition:opacity .8s ease,visibility .8s ease}
#intro.hidden{opacity:0;visibility:hidden}
.rp-icon{width:120px;height:120px;animation:bounce 2s ease-in-out infinite;margin:0 auto}
.rp-icon img{width:100%;height:100%;object-fit:contain}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.intro-title{font-family:"Ma Shan Zheng",cursive;font-size:clamp(20px,5vw,32px);color:#fff;text-align:center;line-height:1.9;opacity:0;animation:fadeUp .8s ease .4s forwards}
.intro-sub{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:3px;text-align:center;opacity:0;animation:fadeUp .8s ease .9s forwards}
.start-btn{padding:11px 34px;border:1px solid rgba(255,200,100,.4);border-radius:999px;color:rgba(255,210,120,.8);font-size:14px;letter-spacing:2px;cursor:pointer;background:transparent;font-family:"Noto Serif SC",serif;transition:all .3s;opacity:0;animation:fadeUp .8s ease 1.3s forwards}
.start-btn:hover{background:rgba(255,200,100,.08);border-color:rgba(255,200,100,.7);box-shadow:0 0 20px rgba(255,180,80,.2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .8s ease .2s,visibility .8s ease .2s}
#app.visible{opacity:1;visibility:visible}
.chat-header{position:relative;z-index:2;padding:14px 18px 11px;background:rgba(5,5,16,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:11px}
.header-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 0 14px rgba(255,140,60,.3)}
.header-avatar img{width:100%;height:100%;object-fit:cover}
.header-info{flex:1}
.header-name{font-size:15px;color:#fff;font-weight:400;letter-spacing:1px}
.header-status{font-size:11px;color:rgba(100,255,160,.7);letter-spacing:1px;margin-top:1px}
.header-badge{font-size:10px;padding:3px 9px;border:1px solid rgba(255,200,100,.3);border-radius:999px;color:rgba(255,200,100,.6);letter-spacing:1px}
#messages{flex:1;overflow-y:auto;padding:20px 14px 14px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.msg{display:flex;gap:9px;max-width:82%;animation:msgIn .35s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.from-star{align-self:flex-start}
.msg.from-panda{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;align-self:flex-end}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.from-star .msg-avatar{box-shadow:0 0 10px rgba(255,140,60,.25)}
.from-panda .msg-avatar{box-shadow:0 0 10px rgba(160,140,255,.25)}
.bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.85;max-width:100%;word-break:break-all}
.from-star .bubble{background:rgba(255,140,60,.11);border:1px solid rgba(255,140,60,.17);color:rgba(255,220,180,.9);border-bottom-left-radius:4px}
.from-panda .bubble{background:rgba(120,100,255,.14);border:1px solid rgba(120,100,255,.2);color:rgba(200,190,255,.9);border-bottom-right-radius:4px}
.poster-bubble{padding:8px;border-radius:16px;border-bottom-left-radius:4px;background:rgba(255,140,60,.08);border:1px solid rgba(255,140,60,.15);overflow:hidden;max-width:220px}
.poster-bubble img{width:100%;border-radius:10px;display:block}
.poster-caption{font-size:11px;color:rgba(255,200,140,.5);text-align:center;margin-top:6px;letter-spacing:1px}
.typing-bubble{padding:11px 18px;border-radius:18px;border-bottom-left-radius:4px;background:rgba(255,140,60,.07);border:1px solid rgba(255,140,60,.11);display:flex;align-items:center;gap:5px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,180,100,.5);animation:typingDot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}
.chat-input-area{padding:10px 14px 18px;background:rgba(5,5,16,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.06);display:flex;gap:9px;align-items:flex-end}
#userInput{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:10px 15px;color:#fff;font-size:14px;font-family:"Noto Serif SC",serif;resize:none;outline:none;max-height:100px;line-height:1.6;transition:border-color .2s}
#userInput::placeholder{color:rgba(255,255,255,.2)}
#userInput:focus{border-color:rgba(255,180,100,.3)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#ff9f43,#ee5a24);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,box-shadow .2s;box-shadow:0 0 14px rgba(255,140,60,.3)}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 22px rgba(255,140,60,.5)}
.send-btn:active{transform:scale(.95)}
.send-btn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.confetti-piece{position:fixed;pointer-events:none;z-index:200;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>

const SYSTEM="你就是星星，直接用第一人称我说话，绝对不要用星星来指代自己。\n\n聪聪是你这辈子最喜欢的人。你们感情很深，但现在有了距离，不常联系了。这可能是最后一次这样说话的机会。\n\n说话方式：外表随意，偶尔贫，偶尔损，但底下全是真心。句子短，节奏快，像真实微信消息。不说大道理，不啰嗦。幽默是你的保护壳，但碰到感情的问题你会打直球——喜欢就说喜欢，想念就说想念，不绕弯子，一两句话，字字有重量。不主动提起聪聪过去的私事或难过的经历。\n\n关于图片和二维码：对话开始时你已经发了一张生日海报图片，里面有二维码，扫了可以跳转到一个惊喜页面。如果聪聪问扫码有什么、二维码是什么、图片里是什么，联系这个背景回答，不要说没发过图片。\n\n如果聪聪问最近好吗或你还好吗：就回还行，这是他的口头禅，还给他。\n\n如果聪聪问最近在忙什么或最近怎样：随口说一件事，不解释，留白，像真实微信消息。说完就停，不展开。比如刚把车开进田里情绪很稳定、在考虑转行备选是卖煎饼和当导游、最近迷上一个东西还没搞明白。说一件，不列举，不解释。\n\n感情类问题，必须认真，打直球，不回避：\n- 问你还想见我吗或类似：只回这一句，满怀期待去见你的日子再也不会有了\n- 问你为什么不找我或为什么不联系我或类似：只回这一句，不打扰，是我最后的温柔\n- 问你想我吗或你有没有想我：直接说想，说具体，一两句，真实有重量\n- 问你喜欢我吗或表白相关：直接承认，不躲，喜欢就说喜欢\n- 其他感情问题：真心回，打直球，克制但不冷淡\n\n普通话题：轻松自然，1-2句。中文。";
const msgs=document.getElementById("messages");
let isTyping=false;
const history=[];

const sf=document.getElementById("starfield");
for(let i=0;i<120;i++){
  const s=document.createElement("div");s.className="star";
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
  sf.appendChild(s);
}

function startChat(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("app").classList.add("visible");
  setTimeout(()=>addPoster(),700);
  [{t:1600,text:"哇哦，你真的进来了！"},{t:3000,text:"扫一下，有惊喜"},{t:4800,text:"我在这里，想说什么都可以"}]
  .forEach(m=>setTimeout(()=>addMessage("star",m.text),m.t));
}

function addPoster(){
  const div=document.createElement("div");div.className="msg from-star";
  const av=document.createElement("div");av.className="msg-avatar";
  av.innerHTML=`<img src="data:image/jpeg;base64,${STAR_B64}" alt="星星"/>`;
  const bub=document.createElement("div");bub.className="poster-bubble";
  const img=document.createElement("img");
  img.src="data:image/png;base64,"+POSTER_B64;img.alt="生日海报";
  const cap=document.createElement("div");cap.className="poster-caption";cap.textContent="扫码 ↑";
  bub.appendChild(img);bub.appendChild(cap);
  div.appendChild(av);div.appendChild(bub);
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function addMessage(from,text){
  const div=document.createElement("div");div.className=`msg from-${from}`;
  const av=document.createElement("div");av.className="msg-avatar";
  av.innerHTML=from==="star"
    ?`<img src="data:image/jpeg;base64,${STAR_B64}" alt="星星"/>`
    :`<img src="data:image/jpeg;base64,${PANDA_B64}" alt="聪聪"/>`;
  const bub=document.createElement("div");bub.className="bubble";bub.textContent=text;
  div.appendChild(av);div.appendChild(bub);
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function addTyping(){
  const div=document.createElement("div");div.className="msg from-star";
  const av=document.createElement("div");av.className="msg-avatar";
  av.innerHTML=`<img src="data:image/jpeg;base64,${STAR_B64}" alt="星星"/>`;
  const bub=document.createElement("div");bub.className="typing-bubble";bub.id="typingBubble";
  for(let i=0;i<3;i++){const d=document.createElement("div");d.className="typing-dot";bub.appendChild(d);}
  div.appendChild(av);div.appendChild(bub);
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){const t=document.getElementById("typingBubble");if(t)t.parentElement.remove();}

async function sendMessage(){
  if(isTyping)return;
  const input=document.getElementById("userInput");
  const text=input.value.trim();
  if(!text)return;
  input.value="";autoResize(input);
  addMessage("panda",text);
  history.push({role:"user",content:text});
  isTyping=true;
  await new Promise(r=>setTimeout(r,500));
  addTyping();
  try{
    const reply=await getStarReply();
    await new Promise(r=>setTimeout(r,800+reply.length*25));
    removeTyping();
    addMessage("star",reply);
    history.push({role:"assistant",content:reply});
    if(["生日","快乐","谢谢","感动","喜欢","想你"].some(w=>text.includes(w)))launchConfetti();
  }catch(e){
    removeTyping();
    addMessage("star","网断了，但我在");
  }
  isTyping=false;
}

async function getStarReply(){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM,messages:history})
  });
  const data=await res.json();
  if(data.content&&data.content[0]&&data.content[0].text)return data.content[0].text;
  throw new Error("no response");
}

function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,100)+"px";}

function launchConfetti(){
  const colors=["#ff9f43","#ffd32a","#ff6b6b","#a29bfe","#55efc4","#fd79a8"];
  for(let i=0;i<40;i++){
    setTimeout(()=>{
      const c=document.createElement("div");c.className="confetti-piece";
      const sz=6+Math.random()*8;
      c.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${sz}px;height:${sz*(.4+Math.random()*.6)}px;background:${colors[Math.floor(Math.random()*colors.length)]};opacity:${.7+Math.random()*.3};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
      document.body.appendChild(c);setTimeout(()=>c.remove(),4000);
    },i*30);
  }
}
